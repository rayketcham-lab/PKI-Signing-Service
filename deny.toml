# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# ============================================================================
# Advisories - Vulnerability database checking
# ============================================================================

[advisories]
# Ignore specific advisories (with justification)
ignore = [
    # RSA Marvin timing sidechannel — v0.6.0 deleted the entire CMS EnvelopedData /
    # OAEP surface (`crypto/rsa_oaep.rs`, `pkcs7/enveloped.rs`, `pkcs7/kem.rs`).
    # The `rsa` crate is now used only for PKCS#1v1.5 *signing* (`signer.rs:14-15`,
    # `tsa_http.rs:26-27`) and for `RsaPrivateKey::from_pkcs8_pem` inside PFX
    # load; there is no OAEP decrypt path in the dep graph. The
    # `tests/supply_chain_regression.rs::rsa_no_oaep_decrypt_reachable_from_web`
    # test greps the compiled binary / source tree for any `oaep_decrypt` or
    # `Oaep` symbol reference, failing CI if one comes back.
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin attack: OAEP surface deleted in v0.6.0; only PKCS#1v1.5 signing remains (verified by supply_chain_regression.rs)" },
    # ml-dsa is now feature-gated behind `pq-experimental` (gh #72). Default
    # builds do not resolve the crate (asserted by
    # tests/pq_feature_gate.rs::default_build_cargo_tree_omits_ml_dsa), but
    # Cargo.lock still pins it for the opt-in feature, so cargo-audit still
    # flags the advisory ID. Ignored here to keep cargo-deny + cargo-audit
    # aligned; the CI --ignore flags use the same ID.
    { id = "RUSTSEC-2025-0144", reason = "ml-dsa timing side-channel: feature-gated behind pq-experimental, absent from default dep graph (verified by pq_feature_gate.rs)" },
    # rustls-pemfile unmaintained — transitive dep via rustls/reqwest, migrating to rustls-pem
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile: unmaintained, transitive via reqwest/rustls, no security impact" },
    # rand 0.8/0.9/0.10 `unsound_with_custom_logger`: only reachable if the
    # application registers a custom `rand::rng` logger with a faulty impl.
    # pki-sign never installs a custom rng logger — the `rand` crate is only
    # used via `ring`/`rsa`/`quinn` defaults. Ignored in the release ci-gate
    # where `cargo audit --deny warnings` would otherwise escalate this to a
    # failure.
    { id = "RUSTSEC-2026-0097", reason = "rand unsound-with-custom-logger: no custom logger registered; transitive via rsa/quinn/p12-keystore" },
]

# ============================================================================
# Licenses - Allowed and denied licenses
# ============================================================================

[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.93

# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",  # Boost
    "MPL-2.0",  # Mozilla Public License (weak copyleft, compatible)
    "Unicode-3.0",
    "OpenSSL",
    "0BSD",  # BSD Zero Clause License (very permissive)
    "CDLA-Permissive-2.0",  # webpki-roots: Community Data License Agreement
]

# Private crates don't require license specification
private = { ignore = true }

# Clarifications for specific crates
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================================================
# Bans - Crate bans and restrictions
# ============================================================================

[bans]
# Lint level for multiple versions of the same crate
multiple-versions = "warn"

# Lint level for wildcard dependencies
wildcards = "warn"

# Highlight the conflicting crates
highlight = "all"

# List of crates to deny entirely
deny = [
    # OpenSSL is fully banned — PKI Signing Service uses rustls for all TLS
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },

    # Legacy hash algorithms - allowed through specific compatibility wrappers
    # sha1: x509-cert parsing, PKCS#12/PFX, OAEP legacy
    { name = "sha1", wrappers = ["pki-sign", "p12", "p12-keystore", "zip"] },

    # Deprecated/insecure crates (no legitimate use)
    { name = "rust-crypto" },
    { name = "crypto" },

    # Avoid these error handling patterns for new code
    { name = "failure" },
    { name = "error-chain" },
]

# Skipping duplicate version checks for specific crates
skip = [
    # Actual duplicates in current dependency tree
    { name = "cpufeatures" },
    { name = "getrandom" },
    { name = "rand" },
    { name = "rand_core" },
    { name = "thiserror" },
    { name = "thiserror-impl" },
    { name = "tower-http" },
]

# ============================================================================
# Sources - Allowed crate sources
# ============================================================================

[sources]
# Lint level for crates not from allowed sources
unknown-registry = "deny"

# Lint level for git sources
unknown-git = "deny"

# Allow only crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Allow git sources only for specific crates (with justification)
allow-git = []

# ============================================================================
# Output configuration
# ============================================================================

[output]
# Feature comparison
feature-depth = 1
