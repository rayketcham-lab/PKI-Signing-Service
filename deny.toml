# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# ============================================================================
# Advisories - Vulnerability database checking
# ============================================================================

[advisories]
# Ignore specific advisories (with justification)
ignore = [
    # Unmaintained crates in transitive dependencies - monitored but acceptable
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error: unmaintained, transitive via tabled, no security impact" },
    { id = "RUSTSEC-2024-0436", reason = "paste macro: unmaintained but widely used, no security impact" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix: unmaintained, display-only functionality" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile: unmaintained, migrating to rustls-pem" },
    # RSA timing sidechannel - mitigated by not using RSA decryption in production signing paths
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin attack: spork-sign only uses RSA signing, not decryption in critical paths" },
]

# ============================================================================
# Licenses - Allowed and denied licenses
# ============================================================================

[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.93

# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",  # Boost
    "MPL-2.0",  # Mozilla Public License (weak copyleft, compatible)
    "Unicode-3.0",
    "OpenSSL",
    "0BSD",  # BSD Zero Clause License (very permissive)
    "LicenseRef-BSL-1.1",  # SPORK crates: Business Source License 1.1
    "CDLA-Permissive-2.0",  # webpki-roots: Community Data License Agreement
]

# Private crates don't require license specification
private = { ignore = true }

# Clarifications for specific crates
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================================================
# Bans - Crate bans and restrictions
# ============================================================================

[bans]
# Lint level for multiple versions of the same crate
multiple-versions = "warn"

# Lint level for wildcard dependencies
wildcards = "warn"

# Highlight the conflicting crates
highlight = "all"

# List of crates to deny entirely
deny = [
    # OpenSSL is fully banned — SPORK uses rustls for all TLS
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },

    # Legacy hash algorithms - allowed through specific compatibility wrappers
    # sha1: x509-cert parsing, PKCS#12/PFX, OAEP legacy
    { name = "sha1", wrappers = ["spork-sign", "axum", "x509-cert", "p12", "p12-keystore"] },

    # Deprecated/insecure crates (no legitimate use)
    { name = "rust-crypto" },
    { name = "crypto" },

    # Avoid these error handling patterns for new code
    { name = "failure" },
    { name = "error-chain" },
]

# Skipping duplicate version checks for specific crates
skip = [
    # Common transitive dependencies with multiple versions
    { name = "aead" },
    { name = "aes" },
    { name = "aes-gcm" },
    { name = "cipher" },
    { name = "ctr" },
    { name = "digest" },
    { name = "block-buffer" },
    # Common version splits in the ecosystem
    { name = "bitflags" },
    { name = "hashbrown" },
    { name = "getrandom" },
    { name = "rand" },
    { name = "rand_chacha" },
    { name = "rand_core" },
    { name = "cfg_aliases" },
    { name = "heck" },
    { name = "linux-raw-sys" },
    { name = "nix" },
    { name = "nom" },
    { name = "thiserror" },
    { name = "thiserror-impl" },
    { name = "syn" },
    # Transitive deps with version splits
    { name = "winreg" },
    { name = "x509-parser" },
    { name = "socket2" },
    { name = "tower-http" },
]

# ============================================================================
# Sources - Allowed crate sources
# ============================================================================

[sources]
# Lint level for crates not from allowed sources
unknown-registry = "deny"

# Lint level for git sources
unknown-git = "deny"

# Allow only crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Allow git sources only for specific crates (with justification)
allow-git = []

# ============================================================================
# Output configuration
# ============================================================================

[output]
# Feature comparison
feature-depth = 1
