name: Security Regression

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-regression:
    name: Security Regression (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            os: Linux
          - name: Windows
            runner: windows-latest
            os: Windows
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97  # v2.8.2
      - name: Run security regression tests (Linux)
        if: matrix.os == 'Linux'
        run: cargo test --workspace security_regression
      - name: Run security regression tests (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: cargo test --workspace security_regression
      - name: Verify dev_mode gated in release
        if: matrix.os == 'Linux'
        run: |
          cargo build --release 2>&1
          strings target/release/pki-sign | grep -c "PKI_SIGN_DEV_MODE" || true
      - name: Verify no HTTP default TSA URLs
        if: matrix.os == 'Linux'
        run: |
          grep -rn 'http://timestamp\.' crates/pki-sign/src/timestamp.rs && exit 1 || echo "OK"
      - name: Verify Content-Disposition sanitization
        if: matrix.os == 'Linux'
        run: |
          CD_COUNT=$(grep -c 'CONTENT_DISPOSITION' crates/pki-sign/src/web/handlers.rs)
          SAN_COUNT=$(grep -c 'sanitize_filename' crates/pki-sign/src/web/handlers.rs)
          if [ "$SAN_COUNT" -lt "$CD_COUNT" ]; then
            echo "FAIL: $CD_COUNT Content-Disposition headers but only $SAN_COUNT sanitize_filename calls"
            exit 1
          fi
          echo "OK: $CD_COUNT Content-Disposition headers, $SAN_COUNT sanitize_filename calls"
      - name: Verify audit log errors are handled
        if: matrix.os == 'Linux'
        run: |
          grep -A20 'fn log' crates/pki-sign/src/web/audit.rs | grep -q 'tracing\|error!\|warn!' || echo "WARN: audit errors may be silent"
      - name: Verify no filesystem path leakage in errors
        if: matrix.os == 'Linux'
        run: |
          grep -n 'pfx_path.display()' crates/pki-sign/src/signer.rs && exit 1 || echo "OK"
