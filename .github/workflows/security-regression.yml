name: Security Regression

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-regression:
    name: Security Regression (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            os: Linux
          - name: Windows
            runner: windows-latest
            os: Windows
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust (Linux)
        if: matrix.os == 'Linux'
        run: |
          rustup default stable
          rustup update stable
      - name: Setup Rust (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          rustup default stable
          rustup update stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run security regression tests (Linux)
        if: matrix.os == 'Linux'
        run: cargo test --workspace security_regression
      - name: Run security regression tests (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: cargo test --workspace security_regression
      - name: Verify dev_mode gated in release
        if: matrix.os == 'Linux'
        run: |
          cargo build --release 2>&1
          strings target/release/pki-sign | grep -c "PKI_SIGN_DEV_MODE" || true
      - name: Verify no HTTP default TSA URLs
        if: matrix.os == 'Linux'
        run: |
          grep -rn 'http://timestamp\.' crates/pki-sign/src/timestamp.rs && exit 1 || echo "OK"
      - name: Verify Content-Disposition sanitization
        if: matrix.os == 'Linux'
        run: |
          CD_COUNT=$(grep -c 'CONTENT_DISPOSITION' crates/pki-sign/src/web/handlers.rs)
          SAN_COUNT=$(grep -c 'sanitize_filename' crates/pki-sign/src/web/handlers.rs)
          if [ "$SAN_COUNT" -lt "$CD_COUNT" ]; then
            echo "FAIL: $CD_COUNT Content-Disposition headers but only $SAN_COUNT sanitize_filename calls"
            exit 1
          fi
          echo "OK: $CD_COUNT Content-Disposition headers, $SAN_COUNT sanitize_filename calls"
      - name: Verify audit log errors are handled
        if: matrix.os == 'Linux'
        run: |
          grep -A20 'fn log' crates/pki-sign/src/web/audit.rs | grep -q 'tracing\|error!\|warn!' || echo "WARN: audit errors may be silent"
      - name: Verify no filesystem path leakage in errors
        if: matrix.os == 'Linux'
        run: |
          grep -n 'pfx_path.display()' crates/pki-sign/src/signer.rs && exit 1 || echo "OK"
      - name: Verify CSP has no unsafe-inline (#53)
        if: matrix.os == 'Linux'
        run: |
          if grep 'const CSP_HEADER_VALUE' crates/pki-sign/src/web/middleware.rs | grep -q 'unsafe-inline'; then
            echo "FAIL: CSP_HEADER_VALUE definition contains 'unsafe-inline'"
            exit 1
          fi
          echo "OK: CSP does not contain 'unsafe-inline'"
      - name: Verify no inline styles in static HTML (#53)
        if: matrix.os == 'Linux'
        run: |
          INLINE_COUNT=$(grep -c 'style="' crates/pki-sign/static/*.html || true)
          if [ "$INLINE_COUNT" -gt 0 ]; then
            echo "FAIL: Found $INLINE_COUNT inline style attributes in static HTML"
            grep -n 'style="' crates/pki-sign/static/*.html
            exit 1
          fi
          echo "OK: No inline styles in static HTML"
      - name: Verify subtle crate used for constant-time comparison (#60)
        if: matrix.os == 'Linux'
        run: |
          if ! grep -q 'subtle' crates/pki-sign/src/web/middleware.rs; then
            echo "FAIL: middleware.rs must use subtle crate for constant-time comparison"
            exit 1
          fi
          echo "OK: subtle crate in use"
      - name: Verify all workflows have explicit permissions (#50)
        if: matrix.os == 'Linux'
        run: |
          FAIL=0
          for wf in .github/workflows/*.yml; do
            if ! grep -q 'permissions:' "$wf"; then
              echo "FAIL: $wf missing permissions: declaration"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "OK: All workflows have permissions declarations"
      - name: Verify rust-toolchain.toml exists (#52)
        if: matrix.os == 'Linux'
        run: |
          if [ ! -f rust-toolchain.toml ]; then
            echo "FAIL: rust-toolchain.toml not found"
            exit 1
          fi
          echo "OK: rust-toolchain.toml exists"
          cat rust-toolchain.toml
      - name: Verify release workflow has CI gate (#51)
        if: matrix.os == 'Linux'
        run: |
          if ! grep -q 'ci-gate' .github/workflows/release.yml; then
            echo "FAIL: release.yml must have a ci-gate job"
            exit 1
          fi
          echo "OK: release.yml has CI gate"
      - name: Verify oaep_decrypt not reachable from web handlers (#48)
        if: matrix.os == 'Linux'
        run: |
          if grep -q 'oaep_decrypt\|enveloped' crates/pki-sign/src/web/handlers.rs; then
            echo "FAIL: web handlers must not reference oaep_decrypt or enveloped"
            exit 1
          fi
          echo "OK: oaep_decrypt not web-reachable"
      - name: Verify error.rs has no axum imports (#56)
        if: matrix.os == 'Linux'
        run: |
          if grep -q 'axum' crates/pki-sign/src/error.rs; then
            echo "FAIL: error.rs must not import axum — SignError must be web-framework independent"
            exit 1
          fi
          echo "OK: error.rs is free of axum imports"
      - name: Verify CIDR support in trusted_proxies (#63)
        if: matrix.os == 'Linux'
        run: |
          if ! grep -q 'ipnet' crates/pki-sign/src/web/middleware.rs; then
            echo "FAIL: middleware.rs must use ipnet crate for CIDR matching (issue #63)"
            exit 1
          fi
          if grep -q 'CIDR notation not yet supported\|which is not yet supported' crates/pki-sign/src/config.rs; then
            echo "FAIL: config.rs still contains the CIDR rejection guard from before #63"
            exit 1
          fi
          echo "OK: CIDR support present in middleware.rs and CIDR rejection guard removed from config.rs"
      - name: Scan for hardcoded secrets (#59)
        if: matrix.os == 'Linux'
        run: |
          FAIL=0
          # Check for common secret patterns in Rust source
          for pattern in 'password\s*=' 'secret\s*=' 'token\s*=' 'PRIVATE KEY' 'api_key\s*='; do
            MATCHES=$(grep -rn "$pattern" crates/pki-sign/src/ --include="*.rs" \
              | grep -v '#\[cfg(test)\]' \
              | grep -v 'password_env' \
              | grep -v 'admin_token_hash' \
              | grep -v 'token\.as_bytes' \
              | grep -v '/// ' \
              | grep -v '//!' \
              | grep -v 'fn test_' \
              | grep -v '_password_env' \
              || true)
            if [ -n "$MATCHES" ]; then
              echo "WARN: Potential secret pattern '$pattern':"
              echo "$MATCHES"
            fi
          done
          # Check for .env files committed
          if find . -name '.env' -not -path './.git/*' | grep -q .; then
            echo "FAIL: .env file found in repository"
            FAIL=1
          fi
          # Check for PFX/PEM files in source (not test fixtures)
          PFX_IN_SRC=$(find crates/pki-sign/src -name '*.pfx' -o -name '*.pem' -o -name '*.key' 2>/dev/null || true)
          if [ -n "$PFX_IN_SRC" ]; then
            echo "FAIL: Certificate/key files in source directory: $PFX_IN_SRC"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "OK: No hardcoded secrets detected"
