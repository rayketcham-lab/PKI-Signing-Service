name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    needs: [fmt]
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97  # v2.8.2
        with:
          prefix-key: "v0-rust-${{ runner.name }}"
      - run: cargo clippy --all-targets --workspace -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97  # v2.8.2
        with:
          prefix-key: "v0-rust-${{ runner.name }}"
      - run: cargo test --workspace

  build:
    name: Build
    needs: [fmt, clippy]
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97  # v2.8.2
        with:
          prefix-key: "v0-rust-${{ runner.name }}"
      - run: cargo build --release
      - name: Verify binary built
        run: |
          if [ ! -f "target/release/pki-sign" ]; then
            echo "ERROR: pki-sign binary not found"
            exit 1
          fi
          VERSION=$(./target/release/pki-sign --version 2>&1 || true)
          echo "OK: $VERSION ($(du -h target/release/pki-sign | cut -f1))"

  build-musl:
    name: Build (musl static)
    needs: [fmt, clippy]
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97  # v2.8.2
        with:
          prefix-key: "v0-rust-${{ runner.name }}"
      - name: Install musl toolchain
        run: |
          if ! command -v musl-gcc &> /dev/null; then
            if command -v apt-get &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y musl-tools
            elif command -v dnf &> /dev/null; then
              sudo dnf install -y musl-devel || echo "musl-gcc not in repos, must be pre-installed"
              command -v musl-gcc || exit 1
            fi
          fi
      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Verify static linking
        run: |
          if ldd "target/x86_64-unknown-linux-musl/release/pki-sign" 2>&1 | grep -q "not a dynamic"; then
            echo "OK: pki-sign is statically linked"
          else
            echo "WARN: pki-sign may not be fully static"
          fi

  audit:
    name: Security Audit
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - name: Install cargo-audit
        run: which cargo-audit || cargo install cargo-audit --locked
      - name: Run audit
        env:
          GITHUB_TOKEN: ""
          GIT_TERMINAL_PROMPT: "0"
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          for attempt in 1 2 3; do
            cargo audit --ignore RUSTSEC-2023-0071 && break
            echo "Attempt $attempt failed, retrying..."
            sleep 5
          done

  cargo-deny:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2
        env:
          GITHUB_TOKEN: ""
          GIT_TERMINAL_PROMPT: "0"
