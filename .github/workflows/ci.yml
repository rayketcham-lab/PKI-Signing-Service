name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
          rustup component add rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    needs: [fmt]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
          rustup component add clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo clippy --all-targets --workspace -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    needs: [fmt, clippy]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            os: Linux
          - name: Windows
            runner: windows-latest
            os: Windows
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust (Linux)
        if: matrix.os == 'Linux'
        run: |
          rustup default stable
          rustup update stable
      - name: Setup Rust (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          rustup default stable
          rustup update stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run tests (Linux)
        if: matrix.os == 'Linux'
        run: cargo test --workspace
      - name: Run tests (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.name }})
    needs: [fmt, clippy]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            os: Linux
          - name: Windows
            runner: windows-latest
            os: Windows
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust (Linux)
        if: matrix.os == 'Linux'
        run: |
          rustup default stable
          rustup update stable
      - name: Setup Rust (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          rustup default stable
          rustup update stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build release (Linux)
        if: matrix.os == 'Linux'
        run: cargo build --release
      - name: Build release (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: cargo build --release
      - name: Verify binary built (Linux)
        if: matrix.os == 'Linux'
        run: |
          if [ ! -f "target/release/pki-sign" ]; then
            echo "ERROR: pki-sign binary not found"
            exit 1
          fi
          VERSION=$(./target/release/pki-sign --version 2>&1 || true)
          echo "OK: $VERSION ($(du -h target/release/pki-sign | cut -f1))"
      - name: Verify binary built (Windows)
        if: matrix.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Test-Path "target\release\pki-sign.exe")) {
            Write-Error "ERROR: pki-sign.exe not found"
            exit 1
          }
          $version = & "target\release\pki-sign.exe" --version 2>&1
          $size = (Get-Item "target\release\pki-sign.exe").Length / 1MB
          Write-Host "OK: $version ($([math]::Round($size, 1)) MB)"

  build-musl:
    name: Build (musl static)
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
          rustup target add x86_64-unknown-linux-musl
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install musl toolchain
        run: |
          if ! command -v musl-gcc &> /dev/null; then
            if command -v apt-get &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y musl-tools
            elif command -v dnf &> /dev/null; then
              sudo dnf install -y musl-devel || echo "musl-gcc not in repos, must be pre-installed"
              command -v musl-gcc || exit 1
            fi
          fi
      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Verify static linking
        run: |
          if ldd "target/x86_64-unknown-linux-musl/release/pki-sign" 2>&1 | grep -q "not a dynamic"; then
            echo "OK: pki-sign is statically linked"
          else
            echo "WARN: pki-sign may not be fully static"
          fi

  authenticode-verify:
    name: Authenticode Verification
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install osslsigncode
        run: |
          if ! command -v osslsigncode &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y osslsigncode
          fi
          osslsigncode --version
      - name: Run Authenticode verification tests
        run: cargo test --workspace -- osslsigncode_verify

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
      - name: Install cargo-audit
        run: which cargo-audit || cargo install cargo-audit --locked
      - name: Run audit
        env:
          GITHUB_TOKEN: ""
          GIT_TERMINAL_PROMPT: "0"
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          for attempt in 1 2 3; do
            cargo audit --ignore RUSTSEC-2023-0071 && break
            echo "Attempt $attempt failed, retrying..."
            sleep 5
          done

  cargo-deny:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
      - name: Install cargo-deny
        run: which cargo-deny || cargo install cargo-deny --locked
      - name: Run cargo-deny
        env:
          GITHUB_TOKEN: ""
          GIT_TERMINAL_PROMPT: "0"
        run: cargo deny check
