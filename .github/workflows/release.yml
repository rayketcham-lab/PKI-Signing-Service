name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.3.0)'
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: run CI checks before building release artifacts
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
          rustup component add clippy rustfmt
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace

  build-linux:
    name: Build Linux (glibc + musl)
    needs: [ci-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
          rustup target add x86_64-unknown-linux-musl
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install musl toolchain
        run: |
          if ! command -v musl-gcc > /dev/null 2>&1; then
            if command -v apt-get > /dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y musl-tools
            fi
          fi
      - name: Build glibc binary
        run: cargo build --release
      - name: Build musl static binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package Linux artifacts
        run: |
          mkdir -p dist
          cp target/release/pki-sign dist/pki-sign-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/pki-sign dist/pki-sign-linux-x86_64-static
          chmod +x dist/pki-sign-linux-x86_64
          chmod +x dist/pki-sign-linux-x86_64-static
      - name: Generate checksums
        run: |
          cd dist
          sha256sum pki-sign-linux-x86_64 > pki-sign-linux-x86_64.sha256
          sha256sum pki-sign-linux-x86_64-static > pki-sign-linux-x86_64-static.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: linux-binaries
          path: dist/

  build-windows:
    name: Build Windows
    needs: [ci-gate]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        shell: powershell
        run: |
          rustup default stable
          rustup update stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build release
        shell: powershell
        run: cargo build --release
      - name: Package Windows artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\pki-sign.exe dist\pki-sign-windows-x86_64.exe
          $hash = (Get-FileHash dist\pki-sign-windows-x86_64.exe -Algorithm SHA256).Hash
          "$hash  pki-sign-windows-x86_64.exe" | Out-File -Encoding utf8 dist\pki-sign-windows-x86_64.exe.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: windows-binaries
          path: dist/

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write  # Required for cosign keyless signing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts/
      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "PKI Signing Service $TAG" \
            --generate-notes \
            artifacts/linux-binaries/* \
            artifacts/windows-binaries/*
      - name: Sign release artifacts with cosign (#62)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          for f in artifacts/linux-binaries/pki-sign-* artifacts/windows-binaries/pki-sign-*; do
            case "$f" in *.sha256) continue ;; esac
            echo "Signing $f..."
            cosign sign-blob "$f" \
              --yes \
              --bundle "${f}.cosign-bundle" \
              --output-signature "${f}.sig"
          done
          # Upload signatures to the release
          gh release upload "$TAG" \
            artifacts/linux-binaries/*.sig \
            artifacts/linux-binaries/*.cosign-bundle \
            artifacts/windows-binaries/*.sig \
            artifacts/windows-binaries/*.cosign-bundle \
            --clobber || echo "WARN: Signature upload failed (cosign may not be configured)"
