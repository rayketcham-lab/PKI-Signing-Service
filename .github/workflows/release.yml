name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.3.0)'
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: run CI checks before building release artifacts
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
          rustup component add clippy rustfmt
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit (RustSec advisories)
        # Ignores must match ci.yml + daily-health.yml:
        #   RUSTSEC-2023-0071 — rsa Marvin attack, oaep_decrypt exists but is not web-reachable (covered by security regression test)
        #   RUSTSEC-2025-0134 — rustls-pemfile unmaintained, transitive via reqwest/rustls
        #   RUSTSEC-2025-0144 — ml-dsa timing; pq-experimental-only (gh #72), absent from default dep graph
        #   RUSTSEC-2026-0097 — rand unsound-with-custom-logger, transitive via rsa/quinn/p12-keystore, no custom logger used
        run: >-
          cargo audit --deny warnings
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2025-0134
          --ignore RUSTSEC-2025-0144
          --ignore RUSTSEC-2026-0097
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny (advisories, licenses, bans, sources)
        run: cargo deny check advisories licenses bans sources

  build-linux:
    name: Build Linux (glibc + musl)
    needs: [ci-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        run: |
          rustup default stable
          rustup update stable
          rustup target add x86_64-unknown-linux-musl
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install musl toolchain
        run: |
          if ! command -v musl-gcc > /dev/null 2>&1; then
            if command -v apt-get > /dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y musl-tools
            fi
          fi
      - name: Build glibc binary
        run: cargo build --release
      - name: Build musl static binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package Linux artifacts
        run: |
          mkdir -p dist
          cp target/release/pki-sign dist/pki-sign-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/pki-sign dist/pki-sign-linux-x86_64-static
          chmod +x dist/pki-sign-linux-x86_64
          chmod +x dist/pki-sign-linux-x86_64-static
      - name: Generate checksums
        run: |
          cd dist
          sha256sum pki-sign-linux-x86_64 > pki-sign-linux-x86_64.sha256
          sha256sum pki-sign-linux-x86_64-static > pki-sign-linux-x86_64-static.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: linux-binaries
          path: dist/

  build-windows:
    name: Build Windows
    needs: [ci-gate]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Setup Rust
        shell: powershell
        run: |
          rustup default stable
          rustup update stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build release
        shell: powershell
        run: cargo build --release
      - name: Package Windows artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\pki-sign.exe dist\pki-sign-windows-x86_64.exe
          $hash = (Get-FileHash dist\pki-sign-windows-x86_64.exe -Algorithm SHA256).Hash
          "$hash  pki-sign-windows-x86_64.exe" | Out-File -Encoding utf8 dist\pki-sign-windows-x86_64.exe.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: windows-binaries
          path: dist/

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write  # Required for cosign keyless signing
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts/
      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "PKI Signing Service $TAG" \
            --generate-notes \
            artifacts/linux-binaries/* \
            artifacts/windows-binaries/*
      - name: Sign release artifacts with cosign (#62)
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for f in artifacts/linux-binaries/pki-sign-* artifacts/windows-binaries/pki-sign-*; do
            case "$f" in *.sha256|*.cosign-bundle) continue ;; esac
            echo "Signing $f..."
            cosign sign-blob "$f" \
              --yes \
              --bundle "${f}.cosign-bundle"
          done
          for f in artifacts/linux-binaries/pki-sign-* artifacts/windows-binaries/pki-sign-*; do
            case "$f" in *.sha256|*.cosign-bundle) continue ;; esac
            if [[ ! -f "${f}.cosign-bundle" ]]; then
              echo "ERROR: missing cosign bundle for $f" >&2
              exit 1
            fi
          done
          gh release upload "$TAG" \
            artifacts/linux-binaries/*.cosign-bundle \
            artifacts/windows-binaries/*.cosign-bundle \
            --clobber

  post-release-smoke:
    name: Post-release asset smoke test (#75)
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Verify published assets match expected manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --json assets --jq '.assets[].name' | sort -u > published.txt
          echo "Published assets:"
          cat published.txt
          required=(
            "pki-sign-linux-x86_64"
            "pki-sign-linux-x86_64.sha256"
            "pki-sign-linux-x86_64.cosign-bundle"
            "pki-sign-linux-x86_64-static"
            "pki-sign-linux-x86_64-static.sha256"
            "pki-sign-linux-x86_64-static.cosign-bundle"
            "pki-sign-windows-x86_64.exe"
            "pki-sign-windows-x86_64.exe.sha256"
            "pki-sign-windows-x86_64.exe.cosign-bundle"
          )
          missing=0
          for name in "${required[@]}"; do
            if ! grep -qxF "$name" published.txt; then
              echo "MISSING asset: $name" >&2
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]] || exit 1
      - name: HTTP 200 check on release asset URLs
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          urls=(
            "${base}/pki-sign-linux-x86_64"
            "${base}/pki-sign-linux-x86_64.sha256"
            "${base}/pki-sign-linux-x86_64-static"
            "${base}/pki-sign-linux-x86_64-static.sha256"
            "${base}/pki-sign-windows-x86_64.exe"
            "${base}/pki-sign-windows-x86_64.exe.sha256"
          )
          for url in "${urls[@]}"; do
            code=$(curl -sS -L -o /dev/null -w '%{http_code}' "$url")
            echo "$code $url"
            [[ "$code" == "200" ]] || { echo "ERROR: non-200 for $url" >&2; exit 1; }
          done
